name: focusly
description: "Focusly — Study Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Local Storage
  shared_preferences: ^2.5.3

  # Google Sign In
  google_sign_in: ^6.2.2

  # Google Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^1.2.0+3

  # SVG support
  flutter_svg: ^2.0.17
  fl_chart: ^1.2.0
  intl: ^0.20.2
  table_calendar: ^3.2.0
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  paymob: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
