name: focusly
description: "Focusly — Study Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Local Storage
  shared_preferences: ^2.5.3

  # Google Sign In
  google_sign_in: ^6.2.2

  # Google Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^1.2.0+3

  # SVG support
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
