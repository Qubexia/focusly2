        kind: { type: string, enum: [summary, flashcards, questions] }
        subjectId: { type: string }
        content: { type: object, description: 'Shape varies by kind — see data-model.md.' }
        createdAt: { type: string, format: date-time }

    AnalyticsSummary:
      type: object
      properties:
        range:
          {
            type: object,
            properties:
