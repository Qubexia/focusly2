openapi: 3.1.0
info:
  title: Focaly API
  description: |
    Backend API for the Focaly Study Management Mobile App.
    See `specs/001-focaly-backend/spec.md` for user-facing requirements and
    `specs/001-focaly-backend/data-model.md` for entity shapes.

    All endpoints versioned under `/v1`. Bearer auth (access credential) is the
    default global security requirement; `Public` endpoints opt out and are
    annotated below. Refresh uses a separate `bearerRefresh` scheme.

    Error envelope (shared component `ErrorResponse`):
    `{ code: string, message: string, details?: object }`
  version: '1.0.0'
servers:
  - url: https://api.focaly.app/v1
    description: production
  - url: https://staging-api.focaly.app/v1
    description: staging
  - url: http://localhost:3000/v1
    description: local dev

security:
  - bearerAccess: []

tags:
  - { name: Auth, description: Registration, login, sessions, password reset (US1) }
  - { name: Users, description: Profile, settings, FCM tokens, account deletion (US1) }
  - { name: Subjects, description: Subjects + chapters; free-plan cap (US2) }
  - { name: Schedules, description: Recurring weekly study schedules (US3) }
  - { name: Pomodoro, description: Pomodoro sessions (US3) }
  - { name: Streaks, description: Streak read API (US4) }
  - { name: Tasks, description: Tasks (US5) }
  - { name: Revisions, description: Revisions (US5) }
  - { name: Lectures, description: Lectures (US5) }
  - { name: Exams, description: Exams (US5) }
  - { name: Notifications, description: Inbox + preferences (US6) }
  - { name: Subscription, description: Premium billing across Stripe/Google Play/App Store (US7) }
  - { name: AI, description: 'AI notes assistant (US8) — Premium' }
  - {
      name: Analytics,
      description: 'Study analytics (US9) — Premium for ranges, free for current week',
    }
  - { name: Uploads, description: Presigned upload authorization (US8 support) }
  - { name: Health, description: Liveness and readiness probes }

paths:
  # ──────────────────────────────── Auth ────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a new user (email + password)
      requestBody: { $ref: '#/components/requestBodies/RegisterBody' }
      responses:
        '201':
          {
            description: Created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } },
          }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Sign in with email + password
      requestBody: { $ref: '#/components/requestBodies/LoginBody' }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } },
          }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/google:
    post:
      tags: [Auth]
      security: []
      summary: Sign in with a Google id_token
      requestBody: { $ref: '#/components/requestBodies/GoogleLoginBody' }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } },
          }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      security: [{ bearerRefresh: [] }]
      summary: Rotate access + refresh credential pair (15-min access, 30-day refresh)
      requestBody: { $ref: '#/components/requestBodies/RefreshBody' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } },
          }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      responses: { '204': { description: No Content } }

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke every session for this user (FR-004)
      responses: { '204': { description: No Content } }

  /auth/forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Email a single-use password reset link
      requestBody: { $ref: '#/components/requestBodies/ForgotPasswordBody' }
      responses: { '204': { description: No Content } }

  /auth/reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Apply a new password using the reset token (revokes existing sessions)
      requestBody: { $ref: '#/components/requestBodies/ResetPasswordBody' }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/verify-email:
    post:
      tags: [Auth]
      security: []
      summary: Mark email verified using the verification token
      requestBody: { $ref: '#/components/requestBodies/VerifyEmailBody' }
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active device sessions (FR-004)
      responses:
        '200':
          description: OK
          content:
            {
              application/json:
                { schema: { type: array, items: { $ref: '#/components/schemas/AuthSession' } } },
            }

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a specific device session
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        '204': { description: No Content }
        '404': { $ref: '#/components/responses/NotFound' }

  # ──────────────────────────────── Users ────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile, plan, settings
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/User' } } },
          }
    patch:
      tags: [Users]
      summary: Update profile (name, locale, timezone, avatar URL)
      requestBody: { $ref: '#/components/requestBodies/UpdateUserBody' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/User' } } },
          }
    delete:
      tags: [Users]
      summary: Soft-delete the account; hard-purge within 30 days (FR-009, SC-012)
      responses: { '204': { description: No Content } }

  /users/me/settings:
    patch:
      tags: [Users]
      summary: Update notification preferences and focusMode
      requestBody: { $ref: '#/components/requestBodies/UpdateSettingsBody' }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/UserSettings' } } },
          }

  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload a new avatar (multipart)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { type: object, properties: { avatarUrl: { type: string, format: uri } } },
                  },
              },
          }

  /users/me/fcm-token:
    post:
      tags: [Users]
      summary: Register / update the push token for the current device session
      requestBody: { $ref: '#/components/requestBodies/FcmTokenBody' }
      responses: { '204': { description: No Content } }

  # ────────────────────────────── Subjects ──────────────────────────────
  /subjects:
    get:
      tags: [Subjects]
      summary: List my subjects
      parameters:
        - { in: query, name: includeArchived, schema: { type: boolean, default: false } }
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: array, items: { $ref: '#/components/schemas/Subject' } } },
              },
          }
    post:
      tags: [Subjects]
      summary: Create a subject (unlimited; all features free)
      requestBody: { $ref: '#/components/requestBodies/CreateSubjectBody' }
      responses:
        '201':
          {
            description: Created,
            content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } },
          }

  /subjects/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:
      tags: [Subjects]
      summary: Read a subject
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } },
          }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Subjects]
      summary: Update a subject
      requestBody: { $ref: '#/components/requestBodies/UpdateSubjectBody' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } },
          }
    delete:
      tags: [Subjects]
      summary: Soft-archive a subject
      responses: { '204': { description: No Content } }

  /subjects/{id}/chapters:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post:
      tags: [Subjects]
      summary: Add a chapter
      requestBody: { $ref: '#/components/requestBodies/CreateChapterBody' }
      responses:
        '201':
          {
            description: Created,
            content: { application/json: { schema: { $ref: '#/components/schemas/Chapter' } } },
          }

  /subjects/{id}/chapters/{chId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: chId, required: true, schema: { type: string } }
    patch:
      tags: [Subjects]
      summary: Update a chapter (toggling `completed` recomputes Subject.progressPercent)
      requestBody: { $ref: '#/components/requestBodies/UpdateChapterBody' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Chapter' } } },
          }

  /subjects/{id}/progress:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:
      tags: [Subjects]
      summary: Subject progress summary
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        properties:
                          {
                            progressPercent: { type: number },
                            chaptersTotal: { type: integer },
                            chaptersCompleted: { type: integer },
                          },
                      },
                  },
              },
          }

  # ───────────────────────────── Schedules ─────────────────────────────
  /subjects/{id}/schedules:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post:
      tags: [Schedules]
      summary: Create a recurring weekly study schedule for this subject
      requestBody: { $ref: '#/components/requestBodies/CreateScheduleBody' }
      responses:
        '201':
          {
            description: Created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/StudySchedule' } } },
          }

  /schedules:
    get:
      tags: [Schedules]
      summary: List my schedules in a range
      parameters:
        - { in: query, name: from, required: true, schema: { type: string, format: date-time } }
        - { in: query, name: to, required: true, schema: { type: string, format: date-time } }
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { type: array, items: { $ref: '#/components/schemas/StudySchedule' } },
                  },
              },
          }

  /schedules/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    patch:
      tags: [Schedules]
      summary: Update a schedule (cancels and reschedules pending reminders — FR-027)
      requestBody: { $ref: '#/components/requestBodies/UpdateScheduleBody' }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/StudySchedule' } } },
          }
    delete:
      tags: [Schedules]
      summary: Delete a schedule (cancels pending reminders — FR-027)
      responses: { '204': { description: No Content } }

  /schedules/calendar:
    get:
      tags: [Schedules]
      summary: Week-view calendar
      parameters:
        [{ in: query, name: range, schema: { type: string, enum: [week, month], default: week } }]
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { type: array, items: { $ref: '#/components/schemas/StudySchedule' } },
                  },
              },
          }

  # ───────────────────────────── Pomodoro ──────────────────────────────
  /pomodoro/start:
    post:
      tags: [Pomodoro]
      summary: Start a pomodoro
      requestBody: { $ref: '#/components/requestBodies/StartPomodoroBody' }
      responses:
        '201':
          {
            description: Created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/PomodoroSession' } } },
          }
        '409':
          description: There is already an active session
          content:
            {
              application/json:
                {
                  schema: { $ref: '#/components/schemas/ErrorResponse' },
                  example:
                    {
                      code: POMODORO_ALREADY_ACTIVE,
                      message: 'Complete or abort the active session first.',
                    },
                },
            }

  /pomodoro/{id}/pause:
    {
      post:
        {
          tags: [Pomodoro],
          summary: Pause an active session,
          parameters: [{ in: path, name: id, required: true, schema: { type: string } }],
          responses:
            {
              '200':
                {
                  description: OK,
                  content:
                    {
                      application/json:
                        { schema: { $ref: '#/components/schemas/PomodoroSession' } },
                    },
                },
            },
        },
    }
  /pomodoro/{id}/resume:
    {
      post:
        {
          tags: [Pomodoro],
          summary: Resume a paused session,
          parameters: [{ in: path, name: id, required: true, schema: { type: string } }],
          responses:
            {
              '200':
                {
                  description: OK,
                  content:
                    {
                      application/json:
                        { schema: { $ref: '#/components/schemas/PomodoroSession' } },
                    },
                },
            },
        },
    }
  /pomodoro/{id}/abort:
    {
      post:
        {
          tags: [Pomodoro],
          summary: Abort the session,
          parameters: [{ in: path, name: id, required: true, schema: { type: string } }],
          responses:
            {
              '200':
                {
                  description: OK,
                  content:
                    {
                      application/json:
                        { schema: { $ref: '#/components/schemas/PomodoroSession' } },
                    },
                },
            },
        },
    }

  /pomodoro/{id}/complete:
    post:
      tags: [Pomodoro]
      summary: Complete the session (emits PomodoroCompletedEvent → streaks/analytics/notifications)
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              {
                type: object,
                required: [cycles],
                properties: { cycles: { type: integer, minimum: 1 } },
              }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/PomodoroSession' } } },
          }

  /pomodoro/today:
    get:
      tags: [Pomodoro]
      summary: Today's total focus minutes (user's timezone)
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        properties:
                          { totalFocusMinutes: { type: integer }, sessions: { type: integer } },
                      },
                  },
              },
          }

  /pomodoro/history:
    get:
      tags: [Pomodoro]
      summary: Paginated session history
      parameters:
        - { in: query, name: from, required: true, schema: { type: string, format: date-time } }
        - { in: query, name: to, required: true, schema: { type: string, format: date-time } }
        - { in: query, name: cursor, schema: { type: string } }
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
          }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/PomodoroPage' } } },
          }

  # ────────────────────────────── Streaks ──────────────────────────────
  /streaks/me:
    get:
      tags: [Streaks]
      summary: My current and longest streak, points, unlocked rewards
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Streak' } } },
          }

  # ──────────────────────────── Planned items ───────────────────────────
  # The four tags below share the same shape (kind discriminator).
  # We document one canonical path family per kind for OpenAPI clarity.
  /tasks: { $ref: '#/components/pathItems/PlannedItemCollection' }
  /tasks/{id}: { $ref: '#/components/pathItems/PlannedItemResource' }
  /tasks/{id}/complete: { $ref: '#/components/pathItems/PlannedItemComplete' }
  /revisions: { $ref: '#/components/pathItems/PlannedItemCollection' }
  /revisions/{id}: { $ref: '#/components/pathItems/PlannedItemResource' }
  /revisions/{id}/complete: { $ref: '#/components/pathItems/PlannedItemComplete' }
  /lectures: { $ref: '#/components/pathItems/PlannedItemCollection' }
  /lectures/{id}: { $ref: '#/components/pathItems/PlannedItemResource' }
  /lectures/{id}/complete: { $ref: '#/components/pathItems/PlannedItemComplete' }
  /exams: { $ref: '#/components/pathItems/PlannedItemCollection' }
  /exams/{id}: { $ref: '#/components/pathItems/PlannedItemResource' }
  /exams/{id}/complete: { $ref: '#/components/pathItems/PlannedItemComplete' }

  # ──────────────────────────── Notifications ──────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: Inbox listing
      parameters:
        - { in: query, name: unreadOnly, schema: { type: boolean, default: false } }
        - { in: query, name: cursor, schema: { type: string } }
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
          }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/NotificationPage' } } },
          }

  /notifications/{id}/read:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    patch:
      {
        tags: [Notifications],
        summary: Mark one entry read,
        responses: { '204': { description: No Content } },
      }

  /notifications/read-all:
    post:
      {
        tags: [Notifications],
        summary: Mark all entries read,
        responses: { '204': { description: No Content } },
      }

  /notifications/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    delete:
      {
        tags: [Notifications],
        summary: Delete an inbox entry,
        responses: { '204': { description: No Content } },
      }

  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Read per-category preferences
      responses:
        {
          '200':
            {
              description: OK,
              content:
                {
                  application/json: { schema: { $ref: '#/components/schemas/NotificationPrefs' } },
                },
            },
        }
    patch:
      tags: [Notifications]
      summary: Update per-category preferences (FR-029)
      requestBody:
        required: true
        content:
          { application/json: { schema: { $ref: '#/components/schemas/NotificationPrefs' } } }
      responses:
        {
          '200':
            {
              description: OK,
              content:
                {
                  application/json: { schema: { $ref: '#/components/schemas/NotificationPrefs' } },
                },
            },
        }

  # ──────────────────────────── Subscription ───────────────────────────
  /subscription/me:
    get:
      tags: [Subscription]
      summary: Read my plan and subscription status
      responses:
        {
          '200':
            {
              description: OK,
              content:
                { application/json: { schema: { $ref: '#/components/schemas/Subscription' } } },
            },
        }

  /subscription/stripe/checkout:
    post:
      tags: [Subscription]
      summary: Create a Stripe Checkout session
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: object, properties: { url: { type: string, format: uri } } } },
              },
          }
        '403': { $ref: '#/components/responses/EmailVerificationRequired' }

  /subscription/stripe/portal:
    post:
      tags: [Subscription]
      summary: Create a Stripe Customer Portal session
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: object, properties: { url: { type: string, format: uri } } } },
              },
          }

  /subscription/webhook/stripe:
    post:
      tags: [Subscription]
      security: []
      summary: Stripe webhook (signature-verified; raw body required)
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '204': { description: No Content }
        '400': { description: Invalid signature }

  /subscription/iap/google/verify:
    post:
      tags: [Subscription]
      summary: Verify a Google Play purchase token
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  {
                    type: object,
                    required: [packageName, productId, purchaseToken],
                    properties:
                      {
                        packageName: { type: string },
                        productId: { type: string },
                        purchaseToken: { type: string },
                      },
                  },
              },
          }
      responses:
        {
          '200':
            {
              description: OK,
              content:
                { application/json: { schema: { $ref: '#/components/schemas/Subscription' } } },
            },
        }

  /subscription/iap/apple/verify:
    post:
      tags: [Subscription]
      summary: Verify an App Store receipt
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  { type: object, required: [receipt], properties: { receipt: { type: string } } },
              },
          }
      responses:
        {
          '200':
            {
              description: OK,
              content:
                { application/json: { schema: { $ref: '#/components/schemas/Subscription' } } },
            },
        }

  /subscription/cancel:
    post:
      tags: [Subscription]
      summary: Mark as cancel-at-period-end (FR-033)
      responses:
        {
          '200':
            {
              description: OK,
              content:
                { application/json: { schema: { $ref: '#/components/schemas/Subscription' } } },
            },
        }

  # ───────────────────────────────── AI ────────────────────────────────
  /ai/notes/jobs:
    post:
      tags: [AI]
      summary: 'Submit an AI notes job (Premium; 5/hour, 30/month — FR-039)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, imageKeys]
              properties:
                subjectId: { type: string }
                imageKeys: { type: array, items: { type: string }, minItems: 1 }
      responses:
        '202':
          {
            description: Accepted,
            content:
              {
                application/json:
                  { schema: { type: object, properties: { jobId: { type: string } } } },
              },
          }
        '403': { $ref: '#/components/responses/PremiumRequired' }
        '429':
          description: AI rate limit exceeded
          headers:
            Retry-After:
              {
                description: 'Seconds until retry is possible (hourly window or monthly reset, whichever applies)',
                schema: { type: integer },
              }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                {
