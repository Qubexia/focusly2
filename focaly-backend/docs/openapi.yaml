                },
            },
        }
    UpdateSettingsBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/UserSettings' } } }
    FcmTokenBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                { type: object, required: [fcmToken], properties: { fcmToken: { type: string } } },
            },
        }
    CreateSubjectBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
