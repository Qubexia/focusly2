                      breakMinutes: { type: integer, minimum: 0, maximum: 60, default: 5 },
                    },
                },
            },
        }
    PlannedItemBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, plannedAt]
            properties:
              subjectId: { type: string }
              title: { type: string }
              notes: { type: string }
              plannedAt: { type: string, format: date-time }
              durationMinutes: { type: integer, minimum: 1 }
              recurrence: { type: string, enum: [daily, weekly, once] }
              reminderMinutesBefore: { type: integer, minimum: 0, default: 15 }
              reminderEnabled: { type: boolean, default: true }

  pathItems:
    PlannedItemCollection:
      get:
        tags: [Tasks, Revisions, Lectures, Exams]
        summary: List planned items of this kind in a range
        parameters:
          - { in: query, name: from, required: true, schema: { type: string, format: date-time } }
          - { in: query, name: to, required: true, schema: { type: string, format: date-time } }
          - { in: query, name: subjectId, required: false, schema: { type: string } }
        responses:
          {
            '200':
              {
                description: OK,
                content:
                  {
                    application/json:
                      {
                        schema:
                          { type: array, items: { $ref: '#/components/schemas/PlannedItem' } },
                      },
                  },
              },
          }
      post:
        tags: [Tasks, Revisions, Lectures, Exams]
        summary: Create a planned item of this kind
        requestBody: { $ref: '#/components/requestBodies/PlannedItemBody' }
        responses:
          {
            '201':
              {
                description: Created,
                content:
                  { application/json: { schema: { $ref: '#/components/schemas/PlannedItem' } } },
              },
          }
    PlannedItemResource:
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      get:
        {
          tags: [Tasks, Revisions, Lectures, Exams],
          summary: Read one,
          responses:
            {
              '200':
                {
                  description: OK,
                  content:
                    { application/json: { schema: { $ref: '#/components/schemas/PlannedItem' } } },
                },
            },
        }
      patch:
        tags: [Tasks, Revisions, Lectures, Exams]
        summary: Update one (cancels and reschedules pending reminders — FR-027)
        requestBody: { $ref: '#/components/requestBodies/PlannedItemBody' }
        responses:
          {
            '200':
              {
                description: OK,
                content:
                  { application/json: { schema: { $ref: '#/components/schemas/PlannedItem' } } },
              },
          }
      delete:
        {
          tags: [Tasks, Revisions, Lectures, Exams],
          summary: Delete one (cancels pending reminders — FR-027),
          responses: { '204': { description: No Content } },
        }
    PlannedItemComplete:
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      post:
        tags: [Tasks, Revisions, Lectures, Exams]
        summary: 'Mark complete (awards reward points; does NOT advance streak — RD-3 / FR-024)'
        responses:
          {
            '200':
              {
                description: OK,
                content:
                  { application/json: { schema: { $ref: '#/components/schemas/PlannedItem' } } },
              },
          }

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: VALIDATION }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    TokenPair:
      type: object
      required: [accessToken, refreshToken, accessExpiresIn, refreshExpiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        accessExpiresIn: { type: integer, example: 900 }
        refreshExpiresIn: { type: integer, example: 2592000 }

    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        tokens: { $ref: '#/components/schemas/TokenPair' }

    AuthSession:
      type: object
      properties:
        id: { type: string }
        deviceId: { type: string }
        userAgent: { type: string }
        ip: { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        current: { type: boolean, description: True if this is the session making the request }

    UserSettings:
      type: object
      properties:
        locale: { type: string, example: en-US }
        timezone: { type: string, example: Europe/Berlin }
        focusMode: { type: boolean }
        notifications:
          type: object
          properties:
            reminders: { type: boolean }
            streak: { type: boolean }
            marketing: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        avatarUrl: { type: string, format: uri }
        emailVerified: { type: boolean }
        plan: { type: string, enum: [free, premium] }
        premiumUntil: { type: string, format: date-time }
        settings: { $ref: '#/components/schemas/UserSettings' }
        totalPoints: { type: integer }

    Subject:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        color: { type: string }
        icon: { type: string }
        dailyTargetMinutes: { type: integer }
        progressPercent: { type: number }
        isArchived: { type: boolean }

    Chapter:
