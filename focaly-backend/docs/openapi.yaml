  # ──────────────────────────────── Uploads ─────────────────────────────
  /uploads/presign:
    post:
      tags: [Uploads]
      summary: Issue a single-use presigned PUT URL (FR-044)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, mimeType, sizeBytes]
              properties:
                kind: { type: string, enum: [avatar, lecture-image] }
                mimeType: { type: string }
                sizeBytes: { type: integer, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: object,
                      properties:
                        {
                          url: { type: string, format: uri },
                          key: { type: string },
                          expiresAt: { type: string, format: date-time },
                        },
                    },
                },
            }

  /uploads/confirm:
    post:
      tags: [Uploads]
      summary: Confirm a completed upload (links the object to the relevant resource)
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { type: object, required: [key], properties: { key: { type: string } } } },
          }
      responses: { '204': { description: No Content } }

  # ──────────────────────────────── Health ─────────────────────────────
  /health:
    get:
      tags: [Health]
      security: []
      summary: Liveness probe
      responses: { '200': { description: OK } }
  /health/ready:
    get:
      tags: [Health]
      security: []
      summary: Readiness probe (db + redis + fcm)
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        properties:
                          { db: { type: string }, redis: { type: string }, fcm: { type: string } },
                      },
                  },
              },
          }
        '503': { description: Not ready }

components:
  securitySchemes:
    bearerAccess:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 15-min access credential (FR-005)
    bearerRefresh:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 30-day rotating refresh credential (FR-005, FR-007)

  responses:
    Unauthorized:
      description: Missing / invalid / revoked credential
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example: { code: UNAUTHORIZED, message: 'Invalid or expired credential.' },
            },
        }
    NotFound:
      description: Resource not found (or not owned)
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example: { code: NOT_FOUND, message: 'Not found.' },
            },
        }
    Conflict:
      description: Resource conflict (e.g., email already registered)
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Unprocessable:
      description: Validation error
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example:
                { code: VALIDATION, message: 'name must not be empty', details: { field: name } },
            },
        }
    TooManyRequests:
      description: Rate limited
      headers: { Retry-After: { schema: { type: integer } } }
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    PremiumRequired:
      description: Premium-only resource (FR-035)
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example:
                { code: PREMIUM_REQUIRED, message: 'Upgrade to premium to access this feature.' },
            },
        }
    SubjectLimit:
      description: Free-plan subject limit reached (FR-012)
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example:
                {
                  code: SUBJECT_LIMIT_REACHED,
                  message: 'Free plan allows up to 3 active subjects.',
                },
            },
        }
    EmailVerificationRequired:
      description: Action requires a verified email (RD-1)
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example:
                {
                  code: EMAIL_VERIFICATION_REQUIRED,
                  message: 'Please verify your email before changing security-sensitive settings.',
                },
            },
        }
    AiRateLimit:
      description: AI rate limit exceeded (FR-039)
      headers: { Retry-After: { schema: { type: integer } } }
      content:
        {
          application/json:
            {
              schema: { $ref: '#/components/schemas/ErrorResponse' },
              example:
                {
                  code: AI_RATE_LIMIT,
                  message: 'AI monthly limit (30/month) reached; resets on the 1st.',
                },
            },
        }

  requestBodies:
    RegisterBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [email, password, name],
                  properties:
                    {
                      email: { type: string, format: email },
                      password: { type: string, minLength: 8 },
                      name: { type: string },
                    },
                },
            },
        }
    LoginBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [email, password, deviceId],
                  properties:
                    {
                      email: { type: string, format: email },
                      password: { type: string },
                      deviceId: { type: string },
                      fcmToken: { type: string },
                    },
                },
            },
        }
    GoogleLoginBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [idToken, deviceId],
                  properties:
                    {
                      idToken: { type: string },
                      deviceId: { type: string },
                      fcmToken: { type: string },
                    },
                },
            },
        }
    RefreshBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [refreshToken, deviceId],
                  properties: { refreshToken: { type: string }, deviceId: { type: string } },
                },
            },
        }
    ForgotPasswordBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [email],
                  properties: { email: { type: string, format: email } },
                },
            },
        }
    ResetPasswordBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [token, newPassword],
                  properties:
                    { token: { type: string }, newPassword: { type: string, minLength: 8 } },
                },
            },
        }
    VerifyEmailBody:
      required: true
      content:
        {
          application/json:
            {
              schema: { type: object, required: [token], properties: { token: { type: string } } },
            },
        }
    UpdateUserBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
