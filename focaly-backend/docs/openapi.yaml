                  properties:
                    {
                      name: { type: string },
                      color: { type: string },
                      icon: { type: string },
                      dailyTargetMinutes: { type: integer, minimum: 0 },
                    },
                },
            },
        }
    UpdateSubjectBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  properties:
                    {
                      name: { type: string },
                      color: { type: string },
                      icon: { type: string },
                      dailyTargetMinutes: { type: integer, minimum: 0 },
                      isArchived: { type: boolean },
                    },
                },
            },
        }
    CreateChapterBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  required: [title],
                  properties: { title: { type: string }, order: { type: integer } },
                },
            },
        }
    UpdateChapterBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  properties:
                    {
                      title: { type: string },
                      order: { type: integer },
                      completed: { type: boolean },
                    },
                },
            },
        }
    CreateScheduleBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, startAt, daysOfWeek]
            properties:
              title: { type: string }
              startAt: { type: string, format: date-time }
              endAt: { type: string, format: date-time }
              daysOfWeek: { type: array, items: { type: integer, minimum: 0, maximum: 6 } }
              rrule: { type: string }
              reminderMinutesBefore: { type: integer, minimum: 0, default: 15 }
              reminderEnabled: { type: boolean, default: true }
    UpdateScheduleBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  type: object,
                  properties:
                    {
                      title: { type: string },
                      startAt: { type: string, format: date-time },
                      endAt: { type: string, format: date-time },
                      daysOfWeek: { type: array, items: { type: integer, minimum: 0, maximum: 6 } },
                      rrule: { type: string },
                      reminderMinutesBefore: { type: integer, minimum: 0 },
                      reminderEnabled: { type: boolean },
                      isActive: { type: boolean },
                    },
                },
            },
        }
    StartPomodoroBody:
      required: false
      content:
        {
