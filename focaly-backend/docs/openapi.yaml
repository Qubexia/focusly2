              type: object,
              properties:
                { code: { type: string }, awardedAt: { type: string, format: date-time } },
            }

    PlannedItem:
      type: object
      properties:
        id: { type: string }
        kind: { type: string, enum: [task, revision, lecture, exam] }
        subjectId: { type: string }
        title: { type: string }
        notes: { type: string }
        plannedAt: { type: string, format: date-time }
        durationMinutes: { type: integer }
        recurrence: { type: string, enum: [daily, weekly, once] }
        reminderMinutesBefore: { type: integer }
        reminderEnabled: { type: boolean }
        completed: { type: boolean }
        completedAt: { type: string, format: date-time }
        rewardPoints: { type: integer }

    Notification:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [reminder, streak, reward, system] }
        title: { type: string }
